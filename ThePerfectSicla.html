<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Perfect Circle Tester</title>
    <style>
        body {
            background-color: #111827;
            color: #ffffff;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        h1 { margin-bottom: 5px; color: #38bdf8; }
        #score { font-size: 32px; font-weight: bold; margin: 10px 0; color: #10b981; min-height: 45px;}
        canvas {
            border: 2px dashed #4b5563;
            background-color: #1f2937;
            border-radius: 50%;
            cursor: crosshair;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .info { margin-top: 15px; color: #9ca3af; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Draw a Perfect Circle</h1>
    <div id="score">Click & Drag to Draw</div>
    <canvas id="paintCanvas" width="450" height="450"></canvas>
    <div class="info">Try to draw a smooth, round loop in one continuous stroke.</div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');

        let isDrawing = false;
        let points = [];

        // Track mouse/touch events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        canvas.addEventListener('touchstart', (e) => { startDrawing(e.touches[0]); e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });
        window.addEventListener('touchend', stopDrawing);

        function startDrawing(e) {
            isDrawing = true;
            points = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            scoreDisplay.innerText = "Drawing...";
            scoreDisplay.style.color = "#38bdf8";
            addPoint(e);
        }

        function draw(e) {
            if (!isDrawing) return;
            addPoint(e);

            // Draw line on canvas
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#38bdf8';
            
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for(let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();
        }

        function addPoint(e) {
            const rect = canvas.getBoundingClientRect();
            points.push({
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            });
        }

        function stopDrawing() {
            if (!isDrawing) return;
            isDrawing = false;

            if (points.length < 15) {
                scoreDisplay.innerText = "Too short! Draw a full circle.";
                scoreDisplay.style.color = "#ef4444";
                return;
            }

            calculateCircleScore();
        }

        function calculateCircleScore() {
            // 1. Find the geometric center (average X and Y)
            let sumX = 0, sumY = 0;
            points.forEach(p => { sumX += p.x; sumY += p.y; });
            const centerX = sumX / points.length;
            const centerY = sumY / points.length;

            // 2. Calculate the distance (radius) from center for every point
            let radii = points.map(p => {
                const dx = p.x - centerX;
                const dy = p.y - centerY;
                return Math.sqrt(dx * dx + dy * dy);
            });

            // 3. Find the average radius
            const avgRadius = radii.reduce((a, b) => a + b, 0) / radii.length;

            // 4. Calculate variance (how much radii deviate from the average)
            let totalDeviation = 0;
            radii.forEach(r => {
                totalDeviation += Math.abs(r - avgRadius);
            });
            const avgDeviation = totalDeviation / radii.length;

            // 5. Convert deviation into a percentage accuracy score
            let accuracy = 100 - (avgDeviation / avgRadius * 100);
            
            // Penalty if the shape didn't wrap all the way back around
            const startPt = points[0];
            const endPt = points[points.length - 1];
            const gap = Math.sqrt(Math.pow(startPt.x - endPt.x, 2) + Math.pow(startPt.y - endPt.y, 2));
            if (gap > avgRadius * 0.4) {
                accuracy -= (gap / avgRadius) * 15; // penalize open loops
            }

            accuracy = Math.max(0, Math.min(100, accuracy)).toFixed(1);

            // Display Results
            scoreDisplay.innerText = `${accuracy}% Match!`;
            if (accuracy > 85) scoreDisplay.style.color = "#10b981";
            else if (accuracy > 70) scoreDisplay.style.color = "#f59e0b";
            else scoreDisplay.style.color = "#ef4444";

            // Visual feedback: Draw the target center point
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 6, 0, Math.PI * 2);
            ctx.fill();
        }
    </script>
</body>
</html>
