<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        .game-container {
            text-align: center;
            background-color: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 350px;
        }

        h1 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 28px;
        }

        .score-display {
            font-size: 24px;
            margin: 20px 0;
            font-weight: bold;
        }

        /* The Clicker Button (The Asteroid) */
        #click-btn {
            background: radial-gradient(circle, #64748b 0%, #334155 100%);
            border: 4px solid #475569;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            color: white;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            transition: transform 0.05s dashed;
            outline: none;
            margin-bottom: 25px;
        }

        #click-btn:active {
            transform: scale(0.95);
            background: radial-gradient(circle, #475569 0%, #1e293b 100%);
        }

        /* Upgrade Section */
        .upgrades {
            border-top: 2px solid #334155;
            padding-top: 20px;
        }

        .upgrade-btn {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            font-weight: 600;
        }

        .upgrade-btn:hover {
            background-color: #0369a1;
        }

        .upgrade-btn:disabled {
            background-color: #475569;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .stats {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Space Miner</h1>
        
        <div class="score-display">
            <span id="crystals">0</span> Crystals
        </div>

        <button id="click-btn">MINE ORE</button>

        <div class="upgrades">
            <button id="buy-drone-btn" class="upgrade-btn" disabled>
                Buy Mining Drone (Cost: 15)
            </button>
            <div class="stats">
                Drones: <span id="drone-count">0</span> (<span id="cps-display">0</span>/sec)
            </div>
        </div>
    </div>

    <script>
        // Game State
        let crystals = 0;
        let drones = 0;
        let droneCost = 15;
        let crystalsPerSecond = 0;

        // DOM Elements
        const crystalsDisplay = document.getElementById('crystals');
        const clickBtn = document.getElementById('click-btn');
        const buyDroneBtn = document.getElementById('buy-drone-btn');
        const droneCountDisplay = document.getElementById('drone-count');
        const cpsDisplay = document.getElementById('cps-display');

        // Update the UI elements based on current numbers
        function updateUI() {
            crystalsDisplay.textContent = Math.floor(crystals);
            droneCountDisplay.textContent = drones;
            cpsDisplay.textContent = crystalsPerSecond;
            buyDroneBtn.textContent = `Buy Mining Drone (Cost: ${droneCost})`;

            // Enable or disable upgrade button based on crystals owned
            if (crystals >= droneCost) {
                buyDroneBtn.disabled = false;
            } else {
                buyDroneBtn.disabled = true;
            }
        }

        // Manual click action
        clickBtn.addEventListener('click', () => {
            crystals += 1;
            updateUI();
        });

        // Purchase upgrade action
        buyDroneBtn.addEventListener('click', () => {
            if (crystals >= droneCost) {
                crystals -= droneCost;
                drones += 1;
                crystalsPerSecond += 1;
                
                // Increase the cost exponentially for the next drone
                droneCost = Math.floor(droneCost * 1.15); 
                
                updateUI();
            }
        });

        // Game Loop: Runs every 100ms (0.1 seconds) to handle passive income smoothly
        setInterval(() => {
            if (crystalsPerSecond > 0) {
                crystals += (crystalsPerSecond / 10);
                updateUI();
            }
        }, 100);
    </script>

</body>
</html>
