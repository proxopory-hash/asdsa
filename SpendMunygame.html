<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spend All the Money - Untitled</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .back-btn { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #0070f3; }
        .balance-bar { background: #2ecc71; color: white; padding: 20px; font-size: 2rem; font-weight: bold; position: sticky; top: 0; border-radius: 8px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 800px; margin: 30px auto; }
        .item-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { padding: 8px 15px; margin: 5px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .buy { background: #2ecc71; color: white; }
        .sell { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">← Back to Untitled</a>
    
    <div class="balance-bar">💵 $<span id="balance">100000000</span></div>

    <div class="items-grid">
        <div class="item-card">
            <h3>🍔 Fast Food Combo</h3>
            <p>$10</p>
            <button class="btn sell" onclick="sellItem(10, 'burger')">Sell</button>
            <span id="count-burger">0</span>
            <button class="btn buy" onclick="buyItem(10, 'burger')">Buy</button>
        </div>
        <div class="item-card">
            <h3>📱 Luxury Smartphone</h3>
            <p>$1,000</p>
            <button class="btn sell" onclick="sellItem(1000, 'phone')">Sell</button>
            <span id="count-phone">0</span>
            <button class="btn buy" onclick="buyItem(1000, 'phone')">Buy</button>
        </div>
        <div class="item-card">
            <h3>🏎️ Supercar</h3>
            <p>$250,000</p>
            <button class="btn sell" onclick="sellItem(250000, 'car')">Sell</button>
            <span id="count-car">0</span>
            <button class="btn buy" onclick="buyItem(250000, 'car')">Buy</button>
        </div>
    </div>

    <script>
        let balance = 100000000;
        const inventory = { burger: 0, phone: 0, car: 0 };

        function updateUI() {
            document.getElementById('balance').innerText = balance.toLocaleString();
            for (let item in inventory) {
                document.getElementById(`count-${item}`).innerText = inventory[item];
            }
        }

        function buyItem(price, item) {
            if (balance >= price) {
                balance -= price;
                inventory[item]++;
                updateUI();
            }
        }

        function sellItem(price, item) {
            if (inventory[item] > 0) {
                balance += price;
                inventory[item]--;
                updateUI();
            }
        }
    </script>
</body>
</html>
