<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Sand Sandbox</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 5px;
            font-size: 28px;
        }

        .description {
            color: #94a3b8;
            margin-bottom: 15px;
            font-size: 14px;
        }

        /* Container for canvas and toolbars */
        .sandbox-container {
            background-color: #1e293b;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        canvas {
            background-color: #000000;
            border: 2px solid #475569;
            border-radius: 4px;
            cursor: crosshair;
            image-rendering: pixelated;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.1s ease;
            background-color: #334155;
            color: #cbd5e1;
        }

        button:hover {
            background-color: #475569;
        }

        /* Element styling states */
        button.active[data-element="sand"] { background-color: #eab308; color: #0f172a; }
        button.active[data-element="water"] { background-color: #3b82f6; color: white; }
        button.active[data-element="wall"] { background-color: #64748b; color: white; }
        button.active[data-element="eraser"] { background-color: #ef4444; color: white; }

        .btn-clear {
            background-color: #1e293b;
            border: 2px solid #ef4444;
            color: #ef4444;
        }
        .btn-clear:hover {
            background-color: #ef4444;
            color: white;
        }
    </style>
</head>
<body>

    <h1>⌛ Pixel Sand Sandbox</h1>
    <div class="description">Select an element and click/drag on the black grid to create reactions!</div>

    <div class="sandbox-container">
        <canvas id="sandbox" width="150" height="150" style="width: 450px; height: 450px;"></canvas>

        <div class="toolbar">
            <button class="active" data-element="sand">Sand</button>
            <button data-element="water">Water</button>
            <button data-element="wall">Wall</button>
            <button data-element="eraser">Eraser</button>
            <button class="btn-clear" onclick="clearGrid()">Clear All</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sandbox');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        // 2D grid matrix: 0 = empty, 1 = sand, 2 = water, 3 = wall
        let grid = Array.from({ length: width }, () => new Array(height).fill(0));
        let currentElement = 'sand';
        let isDrawing = false;

        // Color definitions for grid rendering
        const colors = {
            0: '#000000', // Empty
            1: '#eab308', // Sand (Yellow)
            2: '#3b82f6', // Water (Blue)
            3: '#64748b'  // Wall (Grey)
        };

        // Handle tool changes via toolbar buttons
        document.querySelectorAll('.toolbar button[data-element]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.toolbar button[data-element]').forEach(b => b.classList.remove('active'));
                currentElement = e.target.getAttribute('data-element');
                e.target.classList.add('active');
            });
        });

        // Mouse & touch interaction listeners
        canvas.addEventListener('mousedown', () => isDrawing = true);
        window.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mousemove', draw);

        canvas.addEventListener('touchstart', (e) => { isDrawing = true; draw(e.touches[0]); e.preventDefault(); });
        window.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });

        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            
            // Map window coordinates to backing pixel resolution
            const x = Math.floor((e.clientX - rect.left) / (rect.width / width));
            const y = Math.floor((e.clientY - rect.top) / (rect.height / height));

            // Apply chosen material structure within active drawing radius
            const brushRadius = 2;
            for (let dx = -brushRadius; dx <= brushRadius; dx++) {
                for (let dy = -brushRadius; dy <= brushRadius; dy++) {
                    const nx = x + dx;
                    const ny = y + dy;

                    if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                        if (currentElement === 'sand') grid[nx][ny] = 1;
                        else if (currentElement === 'water') grid[nx][ny] = 2;
                        else if (currentElement === 'wall') grid[nx][ny] = 3;
                        else if (currentElement === 'eraser') grid[nx][ny] = 0;
                    }
                }
            }
        }

        function clearGrid() {
            grid = Array.from({ length: width }, () => new Array(height).fill(0));
        }

        // Cellular Automata Simulation Loop
        function updatePhysics() {
            // Process grid bottom-to-top so falling particles move smoothly
            for (let y = height - 1; y >= 0; y--) {
                for (let x = 0; x < width; x++) {
                    const type = grid[x][y];

                    // 1. SAND PHYSICS
                    if (type === 1) {
                        if (y + 1 < height) {
                            // Check directly below
                            if (grid[x][y + 1] === 0 || grid[x][y + 1] === 2) {
                                let swap = grid[x][y + 1];
                                grid[x][y + 1] = 1;
                                grid[x][y] = swap; // Sand sinks through empty space or water
                            } 
                            // Slump diagonally down left or right
                            else {
                                let leftEmpty = (x - 1 >= 0 && (grid[x - 1][y + 1] === 0 || grid[x - 1][y + 1] === 2));
                                let rightEmpty = (x + 1 < width && (grid[x + 1][y + 1] === 0 || grid[x + 1][y + 1] === 2));
                                
                                if (leftEmpty && rightEmpty) {
                                    // Random choice if both pathways are open
                                    let dir = Math.random() < 0.5 ? -1 : 1;
                                    let swap = grid[x + dir][y + 1];
                                    grid[x + dir][y + 1] = 1;
                                    grid[x][y] = swap;
                                } else if (leftEmpty) {
                                    let swap = grid[x - 1][y + 1];
                                    grid[x - 1][y + 1] = 1;
                                    grid[x][y] = swap;
                                } else if (rightEmpty) {
                                    let swap = grid[x + 1][y + 1];
                                    grid[x + 1][y + 1] = 1;
                                    grid[x][y] = swap;
                                }
                            }
                        }
                    }

                    // 2. WATER PHYSICS
                    else if (type === 2) {
                        if (y + 1 < height && grid[x][y + 1] === 0) {
                            grid[x][y + 1] = 2;
                            grid[x][y] = 0;
                        } else {
                            // Try diagonal paths first
                            let leftDiag = (x - 1 >= 0 && grid[x - 1][y + 1] === 0 && y + 1 < height);
                            let rightDiag = (x + 1 < width && grid[x + 1][y + 1] === 0 && y + 1 < height);

                            if (leftDiag && rightDiag) {
                                let dir = Math.random() < 0.5 ? -1 : 1;
                                grid[x + dir][y + 1] = 2;
                                grid[x][y] = 0;
                            } else if (leftDiag) {
                                grid[x - 1][y + 1] = 2;
                                grid[x][y] = 0;
                            } else if (rightDiag) {
                                grid[x + 1][y + 1] = 2;
                                grid[x][y] = 0;
                            } else {
                                // If blocked below, spread horizontally left or right
                                let leftSide = (x - 1 >= 0 && grid[x - 1][y] === 0);
                                let rightSide = (x + 1 < width && grid[x + 1][y] === 0);

                                if (leftSide && rightSide) {
                                    let dir = Math.random() < 0.5 ? -1 : 1;
                                    grid[x + dir][y] = 2;
                                    grid[x][y] = 0;
                                } else if (leftSide) {
                                    grid[x - 1][y] = 2;
                                    grid[x][y] = 0;
                                } else if (rightSide) {
                                    grid[x + 1][y] = 2;
                                    grid[x][y] = 0;
                                }
                            }
                        }
                    }
                }
            }
        }

        // Render backing data matrix onto canvas pixels
        function render() {
            ctx.clearRect(0, 0, width, height);
            
            // Build pixel image chunk array directly
            const imgData = ctx.createImageData(width, height);
            for (let x = 0; x < width; x++) {
                for (let y = 0; y < height; y++) {
                    const type = grid[x][y];
                    const idx = (y * width + x) * 4;

                    // Expand hex value colors into raw RGBA data chunks
                    if (type === 1) { // Sand
                        imgData.data[idx] = 234; imgData.data[idx+1] = 179; imgData.data[idx+2] = 8; imgData.data[idx+3] = 255;
                    } else if (type === 2) { // Water
                        imgData.data[idx] = 59; imgData.data[idx+1] = 130; imgData.data[idx+2] = 246; imgData.data[idx+3] = 255;
                    } else if (type === 3) { // Wall
                        imgData.data[idx] = 100; imgData.data[idx+1] = 116; imgData.data[idx+2] = 139; imgData.data[idx+3] = 255;
                    } else { // Empty
                        imgData.data[idx] = 0; imgData.data[idx+1] = 0; imgData.data[idx+2] = 0; imgData.data[idx+3] = 255;
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        // Main game cycle frame loop running at ~60fps
        function loop() {
            updatePhysics();
            render();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
