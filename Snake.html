<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retro Snake Game</title>
    <style>
        body {
            background-color: #111827;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 10px; color: #10b981; }
        #score { font-size: 20px; margin-bottom: 20px; }
        canvas {
            border: 4px solid #374151;
            background-color: #1f2937;
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }
        .controls { margin-top: 15px; color: #9ca3af; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Snake</h1>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">Use Arrow Keys to steer. Press Space to restart if you crash.</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 1;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let gameRunning = true;

        function main() {
            if (!gameRunning) return;
            
            moveSnake();
            if (checkGameOver()) {
                gameRunning = false;
                ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ef4444";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Game Over!", canvas.width / 2, canvas.height / 2);
                ctx.fillStyle = "#ffffff";
                ctx.font = "16px Arial";
                ctx.fillText("Press SPACE to restart", canvas.width / 2, canvas.height / 2 + 40);
                return;
            }
            
            checkFoodCollision();
            drawGrid();
        }

        function drawGrid() {
            // Clear canvas
            ctx.fillStyle = "#1f2937";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Snake
            ctx.fillStyle = "#10b981";
            snake.forEach((part, index) => {
                // Head is slightly darker green
                ctx.fillStyle = index === 0 ? "#059669" : "#10b981";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });

            // Draw Food
            ctx.fillStyle = "#ef4444";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            snake.pop();
        }

        function checkFoodCollision() {
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                document.getElementById("score").innerText = "Score: " + score;
                // Add a tail block
                snake.push({...snake[snake.length - 1]});
                spawnFood();
            }
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            // Ensure food doesn't spawn on top of snake
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) spawnFood();
            });
        }

        function checkGameOver() {
            // Wall collisions
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }
            // Self collisions
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        window.addEventListener("keydown", e => {
            switch(e.key) {
                case "ArrowUp":
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case "ArrowDown":
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case "ArrowLeft":
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case "ArrowRight":
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
                case " ": // Spacebar to restart
                    if (!gameRunning) resetGame();
                    break;
            }
        });

        function resetGame() {
            snake = [{x: 10, y: 10}];
            dx = 1;
            dy = 0;
            score = 0;
            document.getElementById("score").innerText = "Score: " + score;
            spawnFood();
            gameRunning = true;
        }

        // Run game loop every 100 milliseconds
        spawnFood();
        setInterval(main, 100);
    </script>
</body>
</html>
